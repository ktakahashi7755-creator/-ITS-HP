<style>
  :root{--paper:#F6F3EC;--ink:#1A1814;--ink-soft:#6B665C;--line:#E4DED2;--accent:#B0512F;
        --font-sans:'Noto Sans JP',sans-serif;--font-display:'Cormorant Garamond','Noto Serif JP',serif;--font-product:'Poppins',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font-sans);color:var(--ink);background:#fff;min-height:100svh;
       display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;line-height:1.9}
  .e__mark{font-family:var(--font-product);font-size:13px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:22px}
  .e__code{font-family:var(--font-display);font-size:clamp(64px,18vw,128px);font-weight:600;line-height:1;color:var(--ink);margin-bottom:8px}
  .e__title{font-family:var(--font-display);font-size:clamp(26px,5vw,40px);font-weight:600;margin-bottom:18px}
  .e__text{font-size:15px;color:var(--ink-soft);max-width:520px;margin:0 auto 36px}
  .e__links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
  .e__btn{display:inline-flex;align-items:center;gap:8px;font-size:14.5px;font-weight:500;
          padding:14px 28px;border-radius:100px;border:1px solid var(--line);color:var(--ink);transition:.25s}
  .e__btn:hover{border-color:var(--ink);transform:translateY(-2px)}
  .e__btn--primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .e__btn--primary:hover{background:#2C2922}
  a{text-decoration:none;color:inherit}
  .e__nav{margin-top:30px;font-size:13.5px;color:var(--ink-soft)}
  .e__nav a{color:var(--accent);padding:0 10px}
</style>
</head>
<body>
